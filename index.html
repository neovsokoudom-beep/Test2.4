<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Check-In/Out</title>
    <style>
        /* Define the custom font */
        @font-face {
            font-family: 'KhmerMPTC';
            src: url('fonts/KhmerMPTC (2).otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'KhmerMPTC', Arial, sans-serif; /* Apply the custom font */
            margin: 40px;
            font-size: 22px;
        }

        label {
            display: block;
            margin-top: 30px;
            font-size: 26px;
        }

        button {
            margin: 30px 15px;
            padding: 20px 40px;
            font-size: 24px;
        }

        .container {
            width: 100%;
        }

        .form-group {
            margin-bottom: 40px;
        }

        .result {
            margin-top: 40px;
            font-weight: bold;
            font-size: 30px;
        }

        /* Style the login form */
        .login-form {
            display: none;
            margin-top: 20px;
        }

        .logged-in {
            display: none;
        }

        .logged-in.active {
            display: block;
        }
    </style>
</head>

<body>

    <h2>ប្រព័ន្ធចុះវត្តមាន</h2> <!-- Attendance System in Khmer -->

    <!-- Login Form -->
    <div id="loginForm" class="login-form">
        <h3>សូមចូលប្រើប្រាស់គណនីរបស់អ្នក</h3>
        <div class="form-group">
            <label for="username">អត្តសញ្ញាណអ្នកប្រើ:</label>
            <input type="text" id="username" style="font-size: 24px; padding: 10px;" placeholder="Username">
        </div>
        <div class="form-group">
            <label for="password">លេខសម្ងាត់:</label>
            <input type="password" id="password" style="font-size: 24px; padding: 10px;" placeholder="Password">
        </div>
        <button onclick="login()">ចូល</button>
    </div>

    <!-- Display the login or attendance system based on login -->
    <div id="loggedInSection" class="logged-in">
        <!-- Employee ID Dropdown -->
        <div class="form-group">
            <label for="empID">លេខសម្គាល់បុគ្គលិក:</label>
            <select id="empID" style="font-size: 24px; padding: 10px;">
                <option value="EMP-001">EMP-001</option>
                <option value="EMP-002">EMP-002</option>
                <option value="EMP-003">EMP-003</option>
                <option value="EMP-004">EMP-004</option>
                <option value="EMP-005">EMP-005</option>
                <option value="EMP-006">EMP-006</option>
                <option value="EMP-007">EMP-007</option>
                <option value="EMP-008">EMP-008</option>
                <option value="EMP-009">EMP-009</option>
                <option value="EMP-010">EMP-010</option>
            </select>
        </div>

        <!-- Branch ID Dropdown -->
        <div class="form-group">
            <label for="branch">លេខសាខា:</label>
            <select id="branch" style="font-size: 24px; padding: 10px;">
                <option value="PP-01">PP-01 (ភ្នំពេញ)</option>
                <option value="SR-001">SR-001 (សៀមរាប)</option>
                <option value="KPC-001">KPC-001 (កំពង់ចាម)</option>
                <option value="PP-02">PP-02 (ភ្នំពេញ)</option>
                <option value="SR-002">SR-002 (សៀមរាប)</option>
                <option value="KPC-002">KPC-002 (កំពង់ចាម)</option>
                <option value="PP-03">PP-03 (ភ្នំពេញ)</option>
                <option value="SR-003">SR-003 (សៀមរាប)</option>
                <option value="KPC-003">KPC-003 (កំពង់ចាម)</option>
                <option value="PP-04">PP-04 (ភ្នំពេញ)</option>
            </select>
        </div>

        <!-- Check-In/Check-Out Buttons -->
        <div class="form-group">
            <button onclick="submitAttendance('Check-In')">វត្តមានចូល</button>
            <button onclick="submitAttendance('Check-Out')">វត្តមានចេញ</button>
        </div>

        <!-- Display Result -->
        <p id="result" class="result"></p>
    </div>

    <script>
        // Set up a sample of valid usernames and passwords
        const validUsers = {
            "EMP-001": "password1",
            "EMP-002": "password2",
            "EMP-003": "password3",
            "EMP-004": "password4",
            "EMP-005": "password5"
        };

        // Check if the user is logged in
        if (localStorage.getItem("loggedIn")) {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("loggedInSection").classList.add("active");
        } else {
            document.getElementById("loginForm").style.display = "block";
        }

        // User login function
        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if (validUsers[username] && validUsers[username] === password) {
                localStorage.setItem("loggedIn", true);
                localStorage.setItem("user", username);

                document.getElementById("loginForm").style.display = "none";
                document.getElementById("loggedInSection").classList.add("active");

                // Show only the logged-in user's Employee ID in the dropdown
                const loggedInUser = localStorage.getItem("user");
                const empIDSelect = document.getElementById("empID");

                for (let i = 0; i < empIDSelect.options.length; i++) {
                    const option = empIDSelect.options[i];
                    if (option.value !== loggedInUser) {
                        option.disabled = true;  // Disable options that are not the logged-in user
                    }
                }
            } else {
                alert("ការចូលប្រើប្រាស់មិនត្រឹមត្រូវ។ សូមព្យាយាមម្តងទៀត!");
            }
        }

        function submitAttendance(action) {
            const loggedInUser = localStorage.getItem("user");

            if (!loggedInUser) {
                alert("សូមចូលប្រើប្រាស់មុនពេលចុះវត្តមាន។");
                return;
            }

            var empID = document.getElementById("empID").value;
            var branch = document.getElementById("branch").value;

            // If the logged-in user tries to log in for another user, prevent it
            if (empID !== loggedInUser) {
                document.getElementById("result").innerText = "អ្នកមិនអាចចុះវត្តមានសម្រាប់អ្នកផ្សេងទេ។";
                return;
            }

            // Perform the attendance action and submit it to Google Apps Script
            var url = "https://script.google.com/macros/s/AKfycbwsFqbfK-tm5Cyk8DForGaCqWWpnc1H62SrSTmw6E2BvQoLOl09Q-yKS2BLqnVJugLnow/exec" +
                "?action=" + encodeURIComponent(action) +
                "&empID=" + encodeURIComponent(empID) +
                "&branch=" + encodeURIComponent(branch);

            fetch(url)
                .then(response => response.text())
                .then(text => {
                    document.getElementById("result").innerText = text;
                })
                .catch(err => {
                    document.getElementById("result").innerText = "Error: " + err;
                });
        }

    </script>

</body>

</html>
