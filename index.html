<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Check-In/Out</title>
    <style>
        /* Define the custom font */
        @font-face {
            font-family: 'KhmerMPTC';
            src: url('fonts/KhmerMPTC (2).otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'KhmerMPTC', Arial, sans-serif; /* Apply the custom font */
            margin: 40px;
            font-size: 22px;
        }

        label {
            display: block;
            margin-top: 30px;
            font-size: 26px;
        }

        button {
            margin: 30px 15px;
            padding: 20px 40px;
            font-size: 24px;
        }

        .container {
            width: 100%;
        }

        .form-group {
            margin-bottom: 40px;
        }

        .result {
            margin-top: 40px;
            font-weight: bold;
            font-size: 30px;
        }
    </style>
</head>

<body>

    <h2>ប្រព័ន្ធចុះវត្តមាន</h2> <!-- Attendance System in Khmer -->

    <!-- Employee ID Dropdown -->
    <div class="form-group">
        <label for="empID">លេខសម្គាល់បុគ្គលិក:</label>
        <select id="empID" style="font-size: 24px; padding: 10px;">
            <option value="EMP-001">EMP-001</option>
            <option value="EMP-002">EMP-002</option>
            <option value="EMP-003">EMP-003</option>
            <option value="EMP-004">EMP-004</option>
            <option value="EMP-005">EMP-005</option>
            <option value="EMP-006">EMP-006</option>
            <option value="EMP-007">EMP-007</option>
            <option value="EMP-008">EMP-008</option>
            <option value="EMP-009">EMP-009</option>
            <option value="EMP-010">EMP-010</option>
        </select>
    </div>

    <!-- Branch ID Dropdown -->
    <div class="form-group">
        <label for="branch">លេខសាខា:</label>
        <select id="branch" style="font-size: 24px; padding: 10px;">
            <option value="PP-01">PP-01 (ភ្នំពេញ)</option>
            <option value="SR-001">SR-001 (សៀមរាប)</option>
            <option value="KPC-001">KPC-001 (កំពង់ចាម)</option>
            <option value="PP-02">PP-02 (ភ្នំពេញ)</option>
            <option value="SR-002">SR-002 (សៀមរាប)</option>
            <option value="KPC-002">KPC-002 (កំពង់ចាម)</option>
            <option value="PP-03">PP-03 (ភ្នំពេញ)</option>
            <option value="SR-003">SR-003 (សៀមរាប)</option>
            <option value="KPC-003">KPC-003 (កំពង់ចាម)</option>
            <option value="PP-04">PP-04 (ភ្នំពេញ)</option>
        </select>
    </div>

    <!-- Check-In/Check-Out Buttons -->
    <div class="form-group">
        <button onclick="submitAttendance('Check-In')">វត្តមានចូល</button>
        <button onclick="submitAttendance('Check-Out')">វត្តមានចេញ</button>
    </div>

    <!-- Display Result -->
    <p id="result" class="result"></p>

    <script>
        // Define the allowed locations for each branch
        const branchLocations = {
            "PP-01": { latitude: 11.5752218, longitude: 104.9230773, radius: 500 },
            "SR-001": { latitude: 13.3599128, longitude: 103.8585311, radius: 20 },
            "KPC-001": { latitude: 12.3000, longitude: 105.0000, radius: 5 },
            "PP-02": { latitude: 11.5752218, longitude: 104.9230773, radius: 500 },
            "SR-002": { latitude: 13.3599128, longitude: 103.8585311, radius: 20 },
            "KPC-002": { latitude: 12.3100, longitude: 105.0100, radius: 5 },
            "PP-03": { latitude: 11.5752218, longitude: 104.9230773, radius: 500 },
            "SR-003": { latitude: 13.3599128, longitude: 103.8585311, radius: 20 },
            "KPC-003": { latitude: 12.3200, longitude: 105.0200, radius: 5 },
            "PP-04": { latitude: 11.5752218, longitude: 104.9230773, radius: 500 }
        };

        function submitAttendance(action) {
            var empID = document.getElementById("empID").value;
            var branch = document.getElementById("branch").value;

            // Get the branch location
            const branchLocation = branchLocations[branch];

            if (!branchLocation) {
                document.getElementById("result").innerText = "ការជ្រើសរើសសាខាមិនត្រឹមត្រូវ។";
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    const distance = calculateDistance(userLat, userLon, branchLocation.latitude, branchLocation.longitude);

                    if (distance <= branchLocation.radius) {
                        var url = "https://script.google.com/macros/s/AKfycbwsFqbfK-tm5Cyk8DForGaCqWWpnc1H62SrSTmw6E2BvQoLOl09Q-yKS2BLqnVJugLnow/exec" +
                            "?action=" + encodeURIComponent(action) +
                            "&empID=" + encodeURIComponent(empID) +
                            "&branch=" + encodeURIComponent(branch);

                        fetch(url)
                            .then(response => response.text())
                            .then(text => {
                                document.getElementById("result").innerText = text;
                            })
                            .catch(err => {
                                document.getElementById("result").innerText = "Error: " + err;
                            });
                    } else {
                        document.getElementById("result").innerText = "អ្នកនៅក្រៅតំបន់ដែលអនុញ្ញាតសម្រាប់ការចុះវត្តមាន។";
                    }
                }, showError);
            } else {
                document.getElementById("result").innerText = "ប្រព័ន្ធ Geolocation មិនត្រូវបានគាំទ្រដោយកម្មវិធីរុករកនេះទេ។";
            }
        }

        // Distance calculation remains the same
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c * 1000;
            return distance;
        }

        function showError(error) {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("result").innerText = "អ្នកបានបដិសេធសំណើសុំចូលប្រើ Geolocation។";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("result").innerText = "ព័ត៌មានទីតាំងមិនមាន availability។";
                    break;
                case error.TIMEOUT:
                    document.getElementById("result").innerText = "សំណើសុំទីតាំងពេលវេលាបង្ហាញហើយ។";
                    break;
                case error.UNKNOWN_ERROR:
                    document.getElementById("result").innerText = "កើតមានកំហុសមិនស្គាល់។";
                    break;
            }
        }
    </script>

</body>

</html>
