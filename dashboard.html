<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cambodia Post - Manager Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f5f7;--card:#ffffff;--primary:#1b4dff;--primary-light:#e8eeff;--primary-dark:#0f2e9e;--success:#0d9f5f;--success-light:#e7f8f0;--success-dark:#087a49;--warning:#d97706;--warning-light:#fef3e0;--warning-dark:#b45309;--danger:#dc2626;--danger-light:#fef2f2;--danger-dark:#991b1b;--text:#111827;--text-secondary:#6b7280;--text-muted:#9ca3af;--border:#e5e7eb;--border-light:#f3f4f6;--shadow-lg:0 12px 40px rgba(0,0,0,0.12);--radius:12px;--radius-lg:20px;--radius-full:9999px;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);min-height:100vh;padding:16px;color:var(--text);-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
    .wrapper{width:100%;max-width:900px}
    .container{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:32px 24px;position:relative;overflow:hidden;animation:slideUp .5s ease;margin-bottom:20px}
    .container::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),#6366f1,var(--primary))}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
    .brand-logo{width:44px;height:44px;background:var(--primary);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
    .brand-text{font-size:15px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px;text-transform:uppercase}
    .header{text-align:center;margin-bottom:24px}
    .header h1{font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.5px}
    .header p{font-size:14px;color:var(--text-muted);font-weight:500}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    .pin-row{display:flex;gap:8px;justify-content:center;margin:20px 0}
    .pin-box{width:48px;height:58px;text-align:center;font-size:24px;font-family:var(--mono);font-weight:500;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);transition:all .2s;-webkit-appearance:none}
    .pin-box:focus{outline:none;border-color:var(--primary);background:var(--card);box-shadow:0 0 0 3px rgba(27,77,255,.12)}
    .btn{width:100%;padding:16px;font-size:16px;font-family:var(--font);font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}.btn-primary:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed}
    .error-msg{color:var(--danger);font-size:14px;font-weight:500;text-align:center;margin-top:12px;min-height:20px}
    .panel{display:none}.panel.active{display:block}
    .lock-icon{cursor:default;-webkit-user-select:none;user-select:none}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .stat-card{padding:16px;border-radius:var(--radius);text-align:center}
    .stat-card .num{font-size:32px;font-weight:700;font-family:var(--mono)}.stat-card .lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
    .stat-total{background:var(--primary-light);color:var(--primary)}
    .stat-in{background:var(--success-light);color:var(--success)}
    .stat-out{background:var(--warning-light);color:var(--warning)}
    .stat-not{background:var(--danger-light);color:var(--danger)}

    /* Table */
    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    thead th{background:var(--primary);color:#fff;padding:12px 14px;text-align:left;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
    tbody td{padding:10px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle}
    tbody tr:hover{background:var(--border-light)}
    tbody tr:last-child td{border-bottom:none}
    .badge{display:inline-block;padding:4px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .badge-in{background:var(--success-light);color:var(--success)}.badge-out{background:var(--warning-light);color:var(--warning)}.badge-not{background:var(--danger-light);color:var(--danger)}.badge-late{background:var(--danger-light);color:var(--danger);margin-left:6px}
    .time-cell{font-family:var(--mono);font-size:13px;color:var(--text-secondary)}
    .branch-tag{font-size:12px;color:var(--text-muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .refresh-btn{padding:10px 20px;font-size:14px;font-family:var(--font);font-weight:600;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s}
    .refresh-btn:hover{background:var(--primary-dark)}
    .refresh-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed}
    .last-update{font-size:13px;color:var(--text-muted);font-family:var(--mono)}
    .branch-name{font-size:14px;font-weight:600;color:var(--primary);background:var(--primary-light);padding:6px 14px;border-radius:var(--radius-full);display:inline-block;margin-bottom:16px}
    .logout-btn{padding:8px 16px;font-size:13px;font-family:var(--font);font-weight:600;background:var(--danger-light);color:var(--danger);border:none;border-radius:var(--radius);cursor:pointer}
    .loader{text-align:center;padding:40px;font-size:16px;color:var(--text-muted)}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:14px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;color:#fff;z-index:3000;transition:transform .4s ease;max-width:90%;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0)}.toast.error{background:rgba(220,38,38,.95)}
    .dev-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:2000;padding:20px}.dev-overlay.visible{display:flex}
    .dev-box{background:var(--card);border-radius:var(--radius-lg);padding:28px;max-width:380px;width:100%}
    .dev-box h3{text-align:center;font-size:18px;margin-bottom:20px}
    .dev-action{width:100%;padding:12px;font-size:14px;font-family:var(--font);font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;margin-bottom:8px}
    .dev-action.gray{background:var(--border-light);color:var(--text-secondary)}
    @media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.stat-card .num{font-size:24px}table{font-size:13px}thead th,tbody td{padding:8px 10px}.container{padding:24px 16px}}
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="toast" class="toast"></div>

    <div id="devPanel" class="dev-overlay"><div class="dev-box"><h3>Developer Access</h3><button class="dev-action gray" onclick="devLoginAll()">View All Branches (No PIN)</button><button class="dev-action gray" onclick="closeDevPanel()">Close</button></div></div>

    <!-- LOGIN -->
    <div class="container panel active" id="panelLogin">
      <div class="brand"><div class="brand-logo lock-icon">CP</div><div class="brand-text">Cambodia Post</div></div>
      <div class="header"><h1>Manager Dashboard</h1><p>Enter your manager PIN to view attendance</p></div>
      <div class="form-label">6-Digit Manager PIN</div>
      <div class="pin-row">
        <input type="password" inputmode="numeric" class="pin-box" maxlength="1" id="mpin1" oninput="mpinNext(1)" onkeydown="mpinBack(event,1)">
        <input type="password" inputmode="numeric" class="pin-box" maxlength="1" id="mpin2" oninput="mpinNext(2)" onkeydown="mpinBack(event,2)">
        <input type="password" inputmode="numeric" class="pin-box" maxlength="1" id="mpin3" oninput="mpinNext(3)" onkeydown="mpinBack(event,3)">
        <input type="password" inputmode="numeric" class="pin-box" maxlength="1" id="mpin4" oninput="mpinNext(4)" onkeydown="mpinBack(event,4)">
        <input type="password" inputmode="numeric" class="pin-box" maxlength="1" id="mpin5" oninput="mpinNext(5)" onkeydown="mpinBack(event,5)">
        <input type="password" inputmode="numeric" class="pin-box" maxlength="1" id="mpin6" oninput="mpinNext(6)" onkeydown="mpinBack(event,6)">
      </div>
      <button class="btn btn-primary" id="mLoginBtn" onclick="managerLogin()" disabled>Sign In</button>
      <div class="error-msg" id="mLoginError"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="container panel" id="panelDashboard">
      <div class="brand"><div class="brand-logo">CP</div><div class="brand-text">Cambodia Post</div></div>
      <div class="header"><h1>Attendance Dashboard</h1><p id="dashDate"></p></div>
      <div class="refresh-bar">
        <div><span class="branch-name" id="dashBranch">All Branches</span></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="refresh-btn" id="refreshBtn" onclick="loadDashboard()">Refresh</button>
          <button class="logout-btn" onclick="managerLogout()">Logout</button>
        </div>
      </div>
      <div class="last-update" id="lastUpdate"></div>
      <div class="stats-row">
        <div class="stat-card stat-total"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
        <div class="stat-card stat-in"><div class="num" id="statIn">0</div><div class="lbl">Checked In</div></div>
        <div class="stat-card stat-out"><div class="num" id="statOut">0</div><div class="lbl">Checked Out</div></div>
        <div class="stat-card stat-not"><div class="num" id="statNot">0</div><div class="lbl">Not Yet</div></div>
      </div>
      <div id="tableArea"><div class="loader">Loading...</div></div>
    </div>
  </div>

  <script>
    var API_URL='https://script.google.com/macros/s/AKfycbwPOoq46rC2nZmuwcLrS00o4BFar6u-hKeM2tf7Tm9T28Mx9QWtWmQ4sOrq6YDIPVIpXw/exec';
    var LATE_HOUR=8;
    var LATE_MIN=0;
    var managerBranches=null; // null = all, array = specific branch indexes


    // Manager PINs: PIN -> { branches: [indexes] or 'all' }
    // Branch names come from API data, not hardcoded here
    var MANAGER_PINS = {
      '999999': { branches: 'all', label: 'Main Manager - All Branches' },
      '100000': { branches: [0], label: 'HQ' },
      '100001': { branches: [1], label: 'Tuek Laak' },
      '100002': { branches: [2], label: 'Dangkor' },
      '100003': { branches: [3], label: 'Boeung Salang' },
      '100004': { branches: [4], label: 'Olympic' },
      '100005': { branches: [5], label: 'Chbar Ampov' },
      '100006': { branches: [6], label: 'Boeung Prolit' },
      '100007': { branches: [7], label: 'Rong Chak Kaew' },
      '100008': { branches: [8], label: 'AEON 1' },
      '100009': { branches: [9], label: 'AEON 2' },
      '100010': { branches: [10], label: 'AEON 3' },
      '100011': { branches: [11], label: 'Pochentong' },
      '100012': { branches: [12], label: 'Siem Reap' },
      '100013': { branches: [13], label: 'Takeo' },
      '100014': { branches: [14], label: 'Passport Office' },
      '100015': { branches: [15], label: 'Tuek Phos' },
      '100016': { branches: [16], label: 'Kampong Tralach' },
      '100017': { branches: [17], label: 'Boribor' },
      '100018': { branches: [18], label: 'Cheung Prey' },
      '100019': { branches: [19], label: 'Ratanak Mondol' },
      '100020': { branches: [20], label: 'Moung Ruessei' },
      '100021': { branches: [21], label: 'Preah Netr Preah' },
      '100022': { branches: [22], label: 'Mongkol Borei' }
    };

    // Employee to location mapping (same as index.html)
    var EMPLOYEE_LOCATION_MAP = {
      '001':[1],'002':[5],'003':[14],'004':[2],'005':[3],'006':[4],
      '007':[6],'008':[7],'009':[8],'010':[9],'011':[10],'012':[0],
      '013':[15],'014':[15],'015':[16],'016':[16],'017':[17],'018':[17],
      '019':[13],'020':[13],'021':[13],'022':[18],'023':[19],'024':[19],
      '025':[20],'026':[20],'027':[21],'028':[21],'029':[22],'030':[22]
    };


    var allEmployees=[];var allAttendance={};
    var autoRefreshTimer=null;

    // PIN input
    function mpinNext(n){if(document.getElementById('mpin'+n).value&&n<6)document.getElementById('mpin'+(n+1)).focus();checkMpinReady();}
    function mpinBack(e,n){if(e.key==='Backspace'&&!document.getElementById('mpin'+n).value&&n>1)document.getElementById('mpin'+(n-1)).focus();}
    function getMpin(){var p='';for(var i=1;i<=6;i++)p+=document.getElementById('mpin'+i).value;return p;}
    function clearMpin(){for(var i=1;i<=6;i++)document.getElementById('mpin'+i).value='';}
    function checkMpinReady(){document.getElementById('mLoginBtn').disabled=getMpin().length!==6;}

    // Dev panel
    var devTapCount=0,devTapTimer=null;
    document.addEventListener('click',function(e){if(e.target.closest('.lock-icon')){devTapCount++;if(devTapTimer)clearTimeout(devTapTimer);devTapTimer=setTimeout(function(){devTapCount=0;},3000);if(devTapCount>=7){devTapCount=0;document.getElementById('devPanel').classList.add('visible');}}});
    function closeDevPanel(){document.getElementById('devPanel').classList.remove('visible');}
    function devLoginAll(){closeDevPanel();managerBranches=null;document.getElementById('dashBranch').textContent='All Branches (Developer)';showPanel('panelDashboard');loadDashboard();}

    function managerLogin(){
      var pin=getMpin();
      if(pin.length!==6)return;
      var mgr=MANAGER_PINS[pin];
      if(!mgr){clearMpin();document.getElementById('mLoginError').textContent='Invalid manager PIN.';document.getElementById('mpin1').focus();return;}
      if(mgr.branches==='all'){managerBranches=null;document.getElementById('dashBranch').textContent='All Branches';}
      else{managerBranches=mgr.branches;document.getElementById('dashBranch').textContent=mgr.label;}
      document.getElementById('mLoginError').textContent='';
      showPanel('panelDashboard');
      loadDashboard();
      // Auto refresh every 30 seconds
      if(autoRefreshTimer)clearInterval(autoRefreshTimer);
      autoRefreshTimer=setInterval(loadDashboard,30000);
    }

    function managerLogout(){
      if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null;}
      managerBranches=null;clearMpin();
      showPanel('panelLogin');
      document.getElementById('mpin1').focus();
    }

    function showPanel(id){document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});document.getElementById(id).classList.add('active');}

    async function loadDashboard(){
      var btn=document.getElementById('refreshBtn');
      btn.disabled=true;btn.textContent='Loading...';
      try{
        var res=await fetch(API_URL+'?action=getDashboardData');
        var result=await res.json();
        if(!result.success){showToast(result.error,'error');btn.disabled=false;btn.textContent='Refresh';return;}
        allEmployees=result.employees;
        allAttendance=result.attendance;
        document.getElementById('dashDate').textContent=result.date;
        renderDashboard();
        document.getElementById('lastUpdate').textContent='Updated: '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      }catch(err){showToast('Failed: '+err.message,'error');}
      btn.disabled=false;btn.textContent='Refresh';
    }

    function renderDashboard(){
      // Filter employees by manager's branch access
      var filtered=[];
      for(var i=0;i<allEmployees.length;i++){
        var emp=allEmployees[i];
        if(managerBranches===null){filtered.push(emp);continue;}
        var empLocs=EMPLOYEE_LOCATION_MAP[emp.id];
        if(empLocs){
          for(var j=0;j<empLocs.length;j++){
            if(managerBranches.indexOf(empLocs[j])!==-1){filtered.push(emp);break;}
          }
        }
      }

      var total=filtered.length,cIn=0,cOut=0,cNot=0;
      var rows=[];
      for(var k=0;k<filtered.length;k++){
        var emp=filtered[k];
        var att=allAttendance[emp.id]||{};
        var status,statusClass,isLate='';

        if(att.checkIn&&att.checkOut){status='Checked Out';statusClass='badge-out';cOut++;}
        else if(att.checkIn){status='Checked In';statusClass='badge-in';cIn++;}
        else{status='Not Yet';statusClass='badge-not';cNot++;}

        if(att.checkIn){
          var parts=att.checkIn.split(':');
          var h=parseInt(parts[0],10),m=parseInt(parts[1],10);
          if(h>LATE_HOUR||(h===LATE_HOUR&&m>LATE_MIN))isLate='LATE';
        }

        rows.push({id:emp.id,name:emp.name,branch:emp.branch,login:att.login||'-',checkIn:att.checkIn||'-',checkOut:att.checkOut||'-',status:status,statusClass:statusClass,late:isLate});
      }

      document.getElementById('statTotal').textContent=total;
      document.getElementById('statIn').textContent=cIn;
      document.getElementById('statOut').textContent=cOut;
      document.getElementById('statNot').textContent=cNot;

      var html='<div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Branch</th><th>Login</th><th>Check In</th><th>Check Out</th><th>Status</th><th>Late</th></tr></thead><tbody>';
      if(rows.length===0){html+='<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">No employees found</td></tr>';}
      for(var r=0;r<rows.length;r++){
        var row=rows[r];
        html+='<tr>';
        html+='<td style="font-weight:600">'+row.id+'</td>';
        html+='<td>'+row.name+'</td>';
        html+='<td><span class="branch-tag" title="'+row.branch+'">'+row.branch+'</span></td>';
        html+='<td class="time-cell">'+row.login+'</td>';
        html+='<td class="time-cell">'+row.checkIn+'</td>';
        html+='<td class="time-cell">'+row.checkOut+'</td>';
        html+='<td><span class="badge '+row.statusClass+'">'+row.status+'</span></td>';
        html+='<td>'+(row.late?'<span class="badge badge-late">'+row.late+'</span>':'')+'</td>';
        html+='</tr>';
      }
      html+='</tbody></table></div>';
      document.getElementById('tableArea').innerHTML=html;
    }

    function showToast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(function(){e.classList.remove('show');},4000);}
  </script>
</body>
</html>
